backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  database:
    client: better-sqlite3
    connection: ':memory:'
  auth:
    # Dev-only static token for curl and other local API checks. Do not use in production.
    externalAccess:
      - type: static
        options:
          token: ${BACKSTAGE_DEV_STATIC_TOKEN}
          subject: local-dev
        accessRestrictions:
          - plugin: catalog

catalog:
  providers:
    threeScaleApiEntity:
      dev:
        baseUrl: '${THREESCALE_BASE_URL}' # https://<TENANT>-admin.3scale.net
        accessToken: '${THREESCALE_ACCESS_TOKEN}'
        schedule: # optional; same options as in TaskScheduleDefinition
          # supports cron, ISO duration, "human duration" as used in code
          frequency: { minutes: 1 }
          # supports ISO duration, "human duration" as used in code
          timeout: { minutes: 1 }
