apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: sonarcloud-create-project
  title: Create SonarCloud Project
  description: Creates a SonarCloud project and sets the default branch
spec:
  owner: platform-team
  type: service

  parameters:
    - title: SonarCloud Project
      required:
        - name
        - projectKey
      properties:
        name:
          title: Project Name
          type: string
          description: Human-readable display name for the project
        projectKey:
          title: Project Key
          type: string
          description: Unique project key within the organization
        visibility:
          title: Visibility
          type: string
          description: Project visibility level
          enum:
            - public
            - private
          default: private

  steps:
    - id: sonarcloudCreate
      action: sonarcloud:project:create
      name: Create SonarCloud Project
      input:
        name: ${{ parameters.name }}
        key: ${{ parameters.projectKey }}
        visibility: ${{ parameters.visibility }}

    - id: sonarcloudBranch
      action: sonarcloud:defaultBranch:rename
      name: Set Default Branch
      input:
        projectKey: ${{ steps['sonarcloudCreate'].output.projectKey }}

  output:
    links:
      - title: SonarCloud Project
        url: ${{ steps['sonarcloudCreate'].output.projectUrl }}
    text:
      - title: Project Key
        content: ${{ steps['sonarcloudCreate'].output.projectKey }}
