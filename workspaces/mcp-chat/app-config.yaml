proxy:

techdocs:
  builder: 'local'
  generator:
    runIn: 'docker'
  publisher:
    type: 'local'

auth:
  session:
    secret: ${AUTH_SESSION_SECRET}
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: true
      enabled: true
      userEntityRef: user:default/guest
    # oidc:
    #   development:
    #     metadataUrl: https://keycloak-rhsso.apps.cluster-n5fv7.dynamic.redhatworkshops.io/auth/realms/backstage/.well-known/openid-configuration
    #     clientId: backstage
    #     clientSecret: ${KEYCLOAK_CLIENT_SECRET}
    #     callbackUrl: http://localhost:7007/api/auth/oidc/handler/frame
    #     additionalScopes:
    #       - openid
    #       - profile
    #       - email
    #     prompt: auto
    #     signIn:
    #       resolvers:
    #         - resolver: emailLocalPartMatchingUserEntityName
    #           dangerouslyAllowSignInWithoutUserInCatalog: true

scaffolder:

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location]
  locations:
    # Local examples with Kubernetes annotations
    - type: file
      target: ./examples/entities.yaml
    - type: file
      target: ./examples/template/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/org.yaml
      rules:
        - allow: [User, Group]

# --------- Kubernetes/OpenShift Configuration ---------
# Required for "Select Pod" dropdown and K8s resource discovery
# Set OPENSHIFT_TOKEN via: export OPENSHIFT_TOKEN=$(oc whoami -t)
kubernetes:
  serviceLocatorMethod:
    type: 'multiTenant'
  clusterLocatorMethods:
    - type: 'config'
      clusters:
        - name: my-openshift-cluster
          url: https://api.your-cluster.example.com:6443
          authProvider: 'serviceAccount'
          serviceAccountToken: ${OPENSHIFT_TOKEN}
          skipTLSVerify: true
# ------------------------------------------------

permission:
  enabled: false
