name: Update Documentation Tables
on:
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run update scripts
        run: |
          echo "Updating Workspaces Table..."
          node scripts/list-workspaces-for-docs.js --save

          echo "Updating Compatibility Tables..."
          node scripts/list-compatibility.js --save

          echo "Updating Feature Tables..."
          node scripts/list-feature.js --save --role frontend

      - name: Check for changes
        id: verify_diff
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.verify_diff.outputs.changes_detected == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update compatibility and workspace tables"
          title: "docs: update compatibility and workspace tables"
          body: |
            This PR was automatically generated by the `update-docs-tables` workflow.
            
            It updates the following documentation to match the current codebase:
            - `docs/README.md`
            - `docs/compatibility/compatibility.md`
            - `docs/compatibility/new-frontend-system.md`
          branch: "auto/docs-table-update"
          base: main
          delete-branch: true
          